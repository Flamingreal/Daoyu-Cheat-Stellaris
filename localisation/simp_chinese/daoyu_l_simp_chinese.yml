 daoyu_auto_project_complete_desc: "完成方式有三种：\n1. 不需要操作，有此$PROJECT_COMPLETE$就会自动完成。\n2. 需要手动点击研究。\n3. 某几个研究时间1天和是部分联邦$PROJECT_COMPLETE$自行手动完成。\n$PROJECT_COMPLETE$的代码非常难写，我用了2周多的时间才写完，需要看每一个$PROJECT_COMPLETE$发生前后的事件，而且不是每个$PROJECT_COMPLETE$都得到了测试，如果遇到问题请及时向我反馈，谢谢。"
