 daoyu_auto_project_complete_desc: "There are three completion methods:\n1. Automatic completion with $PROJECT_COMPLETE$ requiring no operation.\n2. Manual click-to-research requirement.\n3. Certain 1-day research durations and partial Federation $PROJECT_COMPLETE$ self-manual completion.\n\nThe $PROJECT_COMPLETE$ code was extremely challenging to write - it took me over two weeks to complete. It requires checking every event before and after $PROJECT_COMPLETE$ triggers. Note that not every $PROJECT_COMPLETE$ has been fully tested. Please report any issues encountered to me promptly. Thank you."
